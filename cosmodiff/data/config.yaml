# cosmodiff training config

# --- global ---
global:
  device: cpu
  dtype: float32

# --- io ---
io:
  output_dir: /path/to/output

# --- data ---
data:
  img_path: /path/to/images.npy
  img_read_fn: npy_read_fn        # any function in cosmodiff.utils
  label_path: /path/to/labels.npy # optional
  label_read_fn: npy_read_fn      # optional
  two_dim: true
  zthin: 4
  n_samples: null
  seed: null
  keep_on_cpu: true
  log: true
  normalization: center-max  # data norm and kwargs
  norm_kwargs:
    center: null
    xmax: null
    alpha: null
    beta: null

# --- augmentations ---
augmentations:
  RandomRoll:
    size: 128
    dims: [-1, -2]
  RandomFlip:
    dims: [-1, -2]
    p: 0.5

# --- model ---
model:
  class: UNet2DModel
  kwargs:
    sample_size: 64
    in_channels: 1
    out_channels: 1
    layers_per_block: 2
    block_out_channels: [64, 128, 256]
    down_block_types:
      - DownBlock2D
      - DownBlock2D
      - DownBlock2D
    up_block_types:
      - UpBlock2D
      - UpBlock2D
      - UpBlock2D
    norm_num_groups: 32

# --- noise scheduler ---
noise_scheduler:
  class: DDPMScheduler
  kwargs:
    num_train_timesteps: 1000

# --- optimizer ---
optimizer:
  class: AdamW
  kwargs:
    lr: 1.0e-4
    weight_decay: 1.0e-2

# --- lr scheduler ---
lr_scheduler:
  class: ConstantLR
  kwargs:
    factor: 1.0
    total_iters: 0

# --- training ---
train:
  num_epochs: 50
  batch_size: 16
  shuffle: true
  checkpoint_every_n_epochs: 5
  mixed_precision: fp16
  gradient_accumulation_steps: 1
  dataloader_num_workers: 4
  max_grad_norm: 1.0
  conditioning: discrete       # 'discrete' (class_labels) or 'continuous' (encoder_hidden_states)
  cfg_dropout: 0.0             # fraction of labels dropped for CFG training (0 disables)
  ema_sigma_rels: null         # e.g. [0.05, 0.28] to enable post-hoc EMA tracking
  ema_update_every: 100        # optimizer steps between EMA updates
  verbose: true
  force_cpu: false
  pin_memory: false

# --- generation --- WIP still!
generate:
  guidance_scale: null         # CFG guidance scale; null disables amplification
